[pytest]
# 测试文件匹配规则
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = testcases

# 命令行参数
addopts =
    -v
    -s
    --strict-markers
    --tb=short
    --html=reports/report.html
    --self-contained-html
    --reruns=2
    --reruns-delay=1

# 标记定义
markers =
    smoke: 冒烟测试用例
    regression: 回归测试用例
    p0: 核心功能测试
    p1: 重要功能测试
    slow: 慢速测试用例

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置
timeout = 300
timeout_method = thread